<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Request Account - OJT Tracker</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#f6f6f8] min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-3xl shadow-sm p-8 space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold text-[#101622]">Create Account</h1>
            <p class="text-slate-500">Enter your details to join the OJT program</p>
        </div>

        <form id="signupForm" class="space-y-5">
            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700 ml-1">Full Name</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                    <input type="text" id="fullname" required 
                        class="w-full h-14 pl-12 pr-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-[#135bec]" 
                        placeholder="Enter your full name">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700 ml-1">Student ID Number</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">badge</span>
                    <input type="text" id="student_id" required 
                        class="w-full h-14 pl-12 pr-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-[#135bec]" 
                        placeholder="e.g. 2026-XXXX">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700 ml-1">Location / Department</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">location_on</span>
                    <input type="text" id="department" required 
                        class="w-full h-14 pl-12 pr-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-[#135bec]" 
                        placeholder="e.g. IT Department / Accounting">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-semibold text-slate-700 ml-1">Password</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                    <input type="password" id="password" required 
                        class="w-full h-14 pl-12 pr-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-[#135bec]" 
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit" class="w-full h-14 bg-[#135bec] text-white font-bold rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
                Create Account <span class="material-symbols-outlined">person_add</span>
            </button>
        </form>

        <div class="text-center border-t border-slate-100 pt-6">
            <p class="text-slate-500 text-sm">Already have an account?</p>
            <a href="/" class="text-[#101622] font-bold mt-2 inline-block hover:underline">Log In Here</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                username: document.getElementById('fullname').value.trim(),
                student_id: document.getElementById('student_id').value.trim(),
                department: document.getElementById('department').value.trim(), // Added department
                password: document.getElementById('password').value.trim()
            };

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    alert("Account created successfully! You can now log in.");
                    window.location.href = '/';
                } else {
                    alert(result.message || "Registration failed. Please try again.");
                }
            } catch (error) {
                alert("Connection error. Please try again later.");
            }
        });
    </script>
</body>
</html>
