<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OJT Attendance Tracker - Supervisor Reports</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        select, input[type="date"] {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%2364748b' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
    <div class="max-w-md mx-auto bg-white dark:bg-slate-900 min-h-screen flex flex-col shadow-xl relative">
        
        <header class="flex items-center p-4 border-b border-slate-200 dark:border-slate-800">
            <button onclick="window.location.href='/dashboard'" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                <span class="material-symbols-outlined block">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold ml-2">Generate Reports</h1>
        </header>

        <main class="flex-1 overflow-y-auto p-4 space-y-6 pb-24">
            <section class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-500">Report Scope</h2>
                    <button onclick="resetFilters()" class="text-[10px] font-bold text-primary uppercase hover:underline">Clear Filters</button>
                </div>
                
                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Student Selection</label>
                    <div class="relative">
                        <select id="studentSelect" class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 focus:ring-2 focus:ring-primary outline-none transition-all">
                            <option value="{{ user.id }}">{{ user.name }} (Current User)</option>
                            <option value="all">All Students</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-tight">Start Date</label>
                        <input type="date" id="startDate" class="w-full h-11 px-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 text-sm focus:ring-2 focus:ring-primary outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-tight">End Date</label>
                        <input type="date" id="endDate" class="w-full h-11 px-3 rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800 text-sm focus:ring-2 focus:ring-primary outline-none">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-medium text-slate-700 dark:text-slate-300">Report Type</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="typeLog" onclick="toggleType('log')" class="report-type-btn flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary bg-primary/5 text-primary">
                            <span class="material-symbols-outlined mb-1">calendar_month</span>
                            <span class="text-xs font-bold">Attendance Log</span>
                        </button>
                        <button id="typeHours" onclick="toggleType('hours')" class="report-type-btn flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-colors">
                            <span class="material-symbols-outlined mb-1 text-slate-400">timer</span>
                            <span class="text-xs font-bold">Total Hours</span>
                        </button>
                    </div>
                </div>
            </section>

            <section class="pt-4 space-y-3 border-t border-slate-100 dark:border-slate-800">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] text-center mb-2">Export Options</p>
                
                <button id="mainGenBtn" onclick="runReport('pdf')" class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">
                    <span id="genIcon" class="material-symbols-outlined">picture_as_pdf</span>
                    <span id="genText">Generate PDF Report</span>
                </button>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="runReport('pdf')" class="flex items-center justify-center gap-2 py-3 px-4 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-sm font-semibold">
                        <span class="material-symbols-outlined text-red-500">picture_as_pdf</span> PDF
                    </button>
                    <button onclick="runReport('csv')" class="flex items-center justify-center gap-2 py-3 px-4 border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-sm font-semibold">
                        <span class="material-symbols-outlined text-green-600">table_chart</span> CSV
                    </button>
                </div>
            </section>
        </main>

        <nav class="fixed bottom-0 max-w-md w-full border-t border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-50">
            <div class="flex justify-around items-center p-2">
                <a class="flex flex-col items-center p-2 text-slate-400 hover:text-primary transition-colors" href="/dashboard">
                    <span class="material-symbols-outlined">dashboard</span>
                    <span class="text-[10px] mt-1">Dashboard</span>
                </a>
                <a class="flex flex-col items-center p-2 text-slate-400 hover:text-primary transition-colors" href="/attendance">
                    <span class="material-symbols-outlined">fingerprint</span>
                    <span class="text-[10px] mt-1">Attendance</span>
                </a>
                <a class="flex flex-col items-center p-2 text-slate-400 hover:text-primary transition-colors" href="/log">
                    <span class="material-symbols-outlined">history</span>
                    <span class="text-[10px] mt-1">History</span>
                </a>
                <a class="flex flex-col items-center p-2 text-primary" href="/reports">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">assessment</span>
                    <span class="text-[10px] mt-1 font-bold">Reports</span>
                </a>
                <a class="flex flex-col items-center p-2 text-slate-400 hover:text-primary transition-colors" href="/profile">
                    <span class="material-symbols-outlined">person</span>
                    <span class="text-[10px] mt-1">Profile</span>
                </a>
            </div>
        </nav>
    </div>

    <script>
        let selectedType = 'log';

        function toggleType(type) {
            selectedType = type;
            const logBtn = document.getElementById('typeLog');
            const hourBtn = document.getElementById('typeHours');
            const genText = document.getElementById('genText');

            if (type === 'log') {
                logBtn.className = "report-type-btn flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary bg-primary/5 text-primary";
                hourBtn.className = "report-type-btn flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-colors";
                genText.innerText = "Generate PDF Report";
            } else {
                hourBtn.className = "report-type-btn flex flex-col items-center justify-center p-3 rounded-xl border-2 border-primary bg-primary/5 text-primary";
                logBtn.className = "report-type-btn flex flex-col items-center justify-center p-3 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary transition-colors";
                genText.innerText = "Generate Hours Summary";
            }
        }

        function resetFilters() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            document.getElementById('studentSelect').selectedIndex = 0;
        }

        function runReport(format) {
            const studentId = document.getElementById('studentSelect').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            
            // Construct query parameters including the date filters
            let queryParams = `?student_id=${studentId}&type=${selectedType}&start=${startDate}&end=${endDate}`;
            
            if (format === 'csv') {
                window.location.href = `/export/csv${queryParams}`;
            } else if (format === 'pdf') {
                window.open(`/export/pdf${queryParams}`, '_blank');
            }
        }
    </script>
</body>
</html>
